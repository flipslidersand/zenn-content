name: Lint

on:
  pull_request:
    paths:
      - "articles/**"
      - "books/**"

jobs:
  textlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx textlint 'articles/**/*.md' 'books/**/*.md' || true

  word-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check article word count
        run: |
          for f in $(git diff --name-only origin/main...HEAD -- 'articles/*.md'); do
            count=$(wc -m < "$f")
            echo "$f: ${count} chars"
            if [ "$count" -lt 500 ]; then
              echo "::warning file=$f::記事が短すぎます (${count}文字 / 推奨500文字以上)"
            fi
          done
